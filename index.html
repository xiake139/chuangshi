<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文字修仙 · 创世修罗传（fetch版）</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', 'PingFang SC', sans-serif; }
        body { background: #1a2b1f; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 8px; }
        .game-container { max-width: 400px; width: 100%; background: #1e3a2b; border-radius: 32px; box-shadow: 0 20px 30px rgba(0,0,0,0.6); overflow: hidden; border: 2px solid #b38b5d; }
        .screen { background: #1f3d2c; color: #efe6d7; padding: 16px 12px; }
        .auth-screen { background: #0f2a1b; min-height: 500px; display: flex; flex-direction: column; justify-content: center; }
        .auth-card { background: #2a4a33; border-radius: 24px; padding: 24px; border: 1px solid #c4a079; }
        .auth-title { text-align: center; font-size: 28px; font-weight: bold; color: #f9e7c2; margin-bottom: 24px; text-shadow: 2px 2px 0 #5f3e1c; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 14px; color: #d4c5a6; margin-bottom: 4px; }
        .input-group input { width: 100%; padding: 12px 16px; background: #1f3d2c; border: 2px solid #b38b5d; border-radius: 40px; color: #f0e6d2; font-size: 16px; outline: none; }
        .btn { background: #b88b4b; border: none; border-radius: 40px; padding: 14px; font-size: 18px; font-weight: bold; color: #1f2e1b; width: 100%; margin-top: 8px; cursor: pointer; box-shadow: 0 6px 0 #6b4c2a; transition: 0.1s; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #6b4c2a; }
        .auth-switch { text-align: center; margin-top: 20px; color: #c1aa86; }
        .auth-switch span { color: #ffcf8a; text-decoration: underline; cursor: pointer; }
        .header { background: #123020; padding: 12px; border-radius: 30px 30px 16px 16px; border-bottom: 3px solid #b38b5d; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .player-name { font-size: 20px; font-weight: bold; background: #263f2e; padding: 6px 16px; border-radius: 40px; border: 1px solid #d4a76a; }
        .lv { color: #f9d48b; }
        .resource { display: flex; gap: 12px; align-items: center; }
        .ling-shi { background: #356b47; padding: 4px 12px; border-radius: 30px; border: 1px solid #eec27e; font-weight: bold; }
        .hp-bar { background: #3d1f1f; padding: 4px 12px; border-radius: 30px; border: 1px solid #ffa07a; color: #ffbaba; }
        .cultivation { background: #1e3d2d; padding: 4px 12px; border-radius: 30px; font-size: 14px; }
        .map-card { background: #254b33; border-radius: 24px; padding: 14px; border: 2px solid #a2835a; margin-bottom: 12px; }
        .location-name { font-size: 22px; font-weight: bold; color: #fbe5b1; }
        .location-desc { color: #c8d9c0; margin: 6px 0; }
        .monster-npc { display: flex; gap: 20px; margin-top: 12px; }
        .monster-tag { background: #5a3e2b; border-radius: 30px; padding: 8px 18px; border: 1px solid #f3b37c; font-weight: bold; cursor: pointer; }
        .npc-tag { background: #2e5f4a; border-radius: 30px; padding: 8px 18px; border: 1px solid #b8d9a6; cursor: pointer; }
        .direction-panel { display: flex; justify-content: space-between; background: #1f3b28; padding: 12px 8px; border-radius: 60px; margin: 16px 0; border: 1px solid #8b6f47; }
        .dir-btn { background: #b88b4b; border: none; width: 60px; height: 50px; border-radius: 40px; font-size: 24px; font-weight: bold; color: #232b17; box-shadow: 0 4px 0 #6f4f2b; cursor: pointer; }
        .dir-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #6f4f2b; }
        .nav-bar { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; background: #173320; padding: 12px 6px; border-radius: 40px; margin-top: 10px; border: 1px solid #b48c4e; }
        .nav-btn { background: #315e40; border: none; color: #faeacb; font-size: 16px; padding: 8px 10px; border-radius: 30px; flex: 1 0 auto; min-width: 64px; cursor: pointer; border: 1px solid #bfa06b; }
        .panel-content { background: #1c3a26; border-radius: 30px; padding: 20px 16px; border: 2px solid #c3a16b; margin: 12px 0; min-height: 200px; }
        .item-row { display: flex; justify-content: space-between; align-items: center; background: #2b553b; padding: 10px 16px; border-radius: 40px; margin-bottom: 8px; border: 1px solid #dbb47a; }
        .use-btn, .buy-btn { background: #b38b4d; border: none; border-radius: 30px; padding: 6px 16px; color: black; font-weight: bold; cursor: pointer; }
        .back-link { color: #ffd78a; text-align: center; margin-top: 16px; cursor: pointer; }
        .hidden { display: none; }
        .log-container {
            background: #1a2f1f;
            border-radius: 16px;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #a2835a;
        }
        .log-box {
            height: 100px;
            overflow-y: auto;
            font-size: 12px;
            color: #c8d9c0;
            white-space: pre-wrap;
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>
<div class="game-container" id="app">
    <!-- 登录/注册界面 -->
    <div id="authScreen" class="screen auth-screen">
        <div class="auth-card">
            <div class="auth-title">创世修罗传</div>
            <div id="authForm">
                <div class="input-group">
                    <label>邮箱</label>
                    <input type="email" id="emailInput" placeholder="your@email.com">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="passwordInput" placeholder="至少8位">
                </div>
                <div class="input-group" id="roleNameGroup" style="display: none;">
                    <label>角色名</label>
                    <input type="text" id="roleNameInput" placeholder="输入角色名" value="">
                </div>
                <button class="btn" id="loginBtn">登录</button>
                <button class="btn" id="registerBtn" style="background:#4f7653;">注册</button>
            </div>
            <div class="auth-switch">
                <span id="switchToRegister">没有账号？去注册</span>
            </div>
            <div id="authMessage" style="color:#f5a97f; margin-top:12px;"></div>
        </div>
    </div>

    <!-- 游戏主界面 (初始隐藏) -->
    <div id="gameScreen" class="screen hidden">
        <!-- 修改后的头部，添加文字标签 -->
        <div class="header">
            <div class="player-name"><span id="playerName"></span> 【<span id="playerLv">Lv.1</span>】</div>
            <div class="resource">
                <span class="ling-shi">灵石: <span id="lingShi">100</span></span>
                <span class="hp-bar">生命: <span id="hpDisplay">300/300</span></span>
            </div>
            <div class="cultivation">经验: <span id="cultivationVal">0/100</span></div>
        </div>

        <!-- 动态内容面板 -->
        <div id="contentPanel" class="panel-content">
            <!-- 默认显示地图，由js动态填充 -->
        </div>

        <!-- 日志框 -->
        <div class="log-container">
            <div id="logBox" class="log-box"></div>
        </div>

        <div class="nav-bar">
            <button class="nav-btn" data-panel="map">地图</button>
            <button class="nav-btn" data-panel="state">状态</button>
            <button class="nav-btn" data-panel="backpack">背包</button>
            <button class="nav-btn" data-panel="equip">装备</button>
            <button class="nav-btn" data-panel="shop">商城</button>
            <button class="nav-btn" data-panel="crystal">晶石商城</button>
            <button class="nav-btn" data-panel="sign">签到</button>
            <button class="nav-btn" data-panel="manage">管理</button>
        </div>
        <div style="text-align:right; padding:4px; color:#a7b89b; font-size:12px;" id="currentLocTag">新手村</div>
    </div>
</div>

<!-- 引入JS模块 (同一目录) -->
<script type="module" src="api.js"></script>
<script type="module" src="auth.js"></script>
<script type="module" src="gameCore.js"></script>
<script type="module" src="ui.js"></script>
<script type="module" src="map.js"></script>
<script type="module" src="state.js"></script>
<script type="module" src="backpack.js"></script>
<script type="module" src="equipment.js"></script>
<script type="module" src="shop.js"></script>
<script type="module" src="crystalShop.js"></script>
<script type="module" src="sign.js"></script>
<script type="module" src="manage.js"></script>
<script type="module" src="main.js"></script>
</body>
</html>
